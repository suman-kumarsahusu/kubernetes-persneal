kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: daemon
  namespace: nginx
spec:
  selector:
    matchLabels:
     app: nginx

  template:
    metadata:
      name: nginx-pod
      labels:
        app: nginx
     
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
           - containerPort: 80   
