kind: Pod
apiVersion: v1
metadata:
  name: sidecar-pod
  namespace: nginx
spec:
  volumes:
    - name: logs
      emptyDir: {}
  containers:
   - name: main-container
     image: busybox
     command: ["sh","-c","while true; do echo 'hello' >> /var/log/app.log; sleep 5; done"]
     volumeMounts:
       - name: logs
         mountPath: /var/log/

   - name: sidecar-container
     image: busybox
     command: ["sh","-c","tail -f /var/log/app.log"]
     volumeMounts:
       - name: logs
         mountPath: /var/log/

