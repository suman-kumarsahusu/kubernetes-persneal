kind: Deployment
apiVersion: apps/v1
metadata:
  name: recreate-dly
  namespace: nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: Recreate
  template:
    metadata:
      name: recreate-pod
      namespace: nginx
      labels:
        app: nginx
    spec:
      containers:
        - name: recreate-container
          image: amitabhdevops/online_shop
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu : 100m
              memory: 128Mi
            limits:
               cpu : 200m
               memory: 228Mi
