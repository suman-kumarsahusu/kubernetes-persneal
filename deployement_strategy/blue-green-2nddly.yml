kind: Deployment
apiVersion: apps/v1
metadata:
  name: green-dly
  namespace: nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx-green
  template:
    metadata:
      name: green-pod
      namespace: nginx
      labels:
        app: nginx-green
    spec:
      containers:
        - name: green-2ndcontainer
          image: amitabhdevops/online_shop_without_footer
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu : 100m
              memory: 128Mi
            limits:
               cpu : 200m
               memory: 228Mi

---
apiVersion: v1
kind: Service
metadata:
  name: green-service
  namespace: nginx
spec:
  selector:
    app: nginx-green
  type: NodePort
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3000
      nodePort: 30001
