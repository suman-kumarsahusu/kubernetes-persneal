kind: Deployment
apiVersion: apps/v1
metadata:
  name: deployement-demo 
  namespace: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
     app: nginx

  template:
    metadata:
      name: nginx-pod
      labels:
        app: nginx
     
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
           - containerPort: 80   
