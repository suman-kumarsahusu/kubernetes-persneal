
kind: ServiceAccount
apiVersion: v1
metadata:
  name: clusteruser
  namespace: kubernetes-dashboard
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: clusterrole
  namespace: kubernetes-dashboard
subjects:
- kind: ServiceAccount
  name: clusteruser
  namespace: kubernetes-dashboard  
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: cluster-admin
